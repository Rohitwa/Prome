# fly.toml app configuration file generated for promem on 2026-04-26T09:34:35+05:30
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'promem'
primary_region = 'bom'

[build]

[env]
  PROMEM_DATA_DIR = '/data'
  PROMEM_SECURE_COOKIES = 'true'

[[mounts]]
  source = 'data'
  destination = '/data'

[http_service]
  internal_port = 8888
  force_https = true
  # Keep at least one machine running so the in-app APScheduler ticks
  # for the cloud orchestrator (4c.5c). Auto-stop disabled accordingly.
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/login'

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
